server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA — all unknown paths served as index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Odoo JSON-RPC, session, and assets
    location /web/ {
        proxy_pass         http://odoo:8069/web/;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 300s;
    }

    # Odoo bus long-poll (hold connections open)
    location /longpolling/ {
        proxy_pass             http://odoo:8069/longpolling/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_buffering        off;
    }

    # Static assets — aggressive cache
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
