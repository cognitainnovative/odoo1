[pytest]
# Cross-service suite (run from repo root: `pytest tests` or `make test-e2e`).
# These tests run against a LIVE stack and skip cleanly when components are down.
testpaths = api e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
markers =
    e2e: end-to-end flow against a live Odoo + gateways stack
