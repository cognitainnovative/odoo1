[tool.ruff]
target-version = "py311"
line-length = 100
src = ["addons", "services", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line-length handled by black
    "B008",  # function-call in default arg (common in Odoo models)
    "B904",  # raise-from in except (not always applicable in Odoo)
    "B018",  # "useless expression" — Odoo __manifest__.py files are plain dicts
]
exclude = [
    ".git",
    "__pycache__",
    ".odoo_data",
    "addons/*/migrations",
    "addons/*/__manifest__.py",
]

[tool.ruff.lint.per-file-ignores]
# Odoo __init__.py files use side-effect imports for ORM registration — not unused
"addons/*/__init__.py" = ["F401"]
"addons/*/models/__init__.py" = ["F401", "I001"]
"addons/*/controllers/__init__.py" = ["F401"]
"addons/*/tests/__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-third-party = ["odoo"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.git
  | __pycache__
  | \.odoo_data
  | addons/.*/migrations
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
