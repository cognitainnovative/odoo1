apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform.fullname" . }}-minio
  labels: {{- include "platform.labels" . | nindent 4 }}
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector: {{- include "platform.selectorLabels" (dict "component" "minio" "context" .) | nindent 4 }}
