apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform.fullname" . }}-odoo
  labels: {{- include "platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.odoo.replicas }}
  selector:
    matchLabels: {{- include "platform.selectorLabels" (dict "component" "odoo" "context" .) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "platform.selectorLabels" (dict "component" "odoo" "context" .) | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "platform.fullname" . }}-postgres 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "platform.fullname" . }}-redis 6379; do
                echo "waiting for redis..."; sleep 2;
              done
      containers:
        - name: odoo
          image: {{ .Values.odoo.image.repository }}:{{ .Values.odoo.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8069
            - containerPort: 8072   # longpoll
          envFrom:
            - configMapRef:
                name: {{ include "platform.fullname" . }}-config
          env:
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "platform.fullname" . }}-config
                  key: POSTGRES_HOST
            - name: PORT
              value: "5432"
            - name: USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "platform.fullname" . }}-config
                  key: POSTGRES_USER
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "platform.fullname" . }}-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
          livenessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 30
            periodSeconds: 10
          resources: {{- toYaml .Values.odoo.resources | nindent 12 }}
      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: {{ include "platform.fullname" . }}-odoo-data
