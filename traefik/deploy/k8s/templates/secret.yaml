apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform.fullname" . }}-secrets
  labels: {{- include "platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | quote }}
  ODOO_ADMIN_PASSWORD: {{ .Values.odoo.adminPassword | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  AI_GATEWAY_SECRET: {{ .Values.secrets.aiGatewaySecret | quote }}
  WHATSAPP_APP_SECRET: {{ .Values.secrets.whatsappAppSecret | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  BANK_IMPORT_SECRET: {{ .Values.secrets.bankImportSecret | quote }}
