apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform.fullname" . }}-postgres
  labels: {{- include "platform.labels" . | nindent 4 }}
spec:
  clusterIP: None   # headless for StatefulSet DNS
  ports:
    - port: 5432
      targetPort: 5432
  selector: {{- include "platform.selectorLabels" (dict "component" "postgres" "context" .) | nindent 4 }}
