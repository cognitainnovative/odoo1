apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform.fullname" . }}-redis
  labels: {{- include "platform.labels" . | nindent 4 }}
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector: {{- include "platform.selectorLabels" (dict "component" "redis" "context" .) | nindent 4 }}
