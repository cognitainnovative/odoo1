# Prometheus scrape configuration for the platform (opt-in observability profile).
# Brought up via: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml --profile monitoring up -d
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: odoo-modular-erp

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI gateways expose /metrics when prometheus-fastapi-instrumentator is enabled.
  # Until then these targets simply report DOWN — harmless, and ready for instrumentation.
  - job_name: ai-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-gateway:8000"]
        labels: { service: ai_gateway }

  - job_name: integration-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["integration-gateway:8001"]
        labels: { service: integration_gateway }

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels: { service: containers }

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels: { service: host }
