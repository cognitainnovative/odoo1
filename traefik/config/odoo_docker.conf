[options]
; ── Database (Docker service name) ────────────────────────────────────────────
; Overridden at runtime by HOST/PORT/USER/PASSWORD env vars in docker-compose.yml
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = platform_dev

; ── Paths ─────────────────────────────────────────────────────────────────────
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; ── Server ────────────────────────────────────────────────────────────────────
http_port = 8069
workers = 2
max_cron_threads = 1

; ── Logging ───────────────────────────────────────────────────────────────────
log_level = info
log_handler = :INFO

; ── Security ──────────────────────────────────────────────────────────────────
admin_passwd = change_in_production
list_db = False
proxy_mode = True
